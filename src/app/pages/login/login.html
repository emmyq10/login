<div class="login-container">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-4 col-md-6">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">

                        <!-- Logo / Header -->
                        <div class="text-center mb-4">
                            <h1 class="fw-bold text-primary">
                                Welcome Back
                            </h1>
                            <p class="text-muted">
                                Login to continue
                            </p>
                        </div>

                        <!-- Login Form -->
                        <form [formGroup]="loginForm" (ngSubmit)="loginUser()">

                            <!-- Username -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Username
                                </label>
                                <input type="text" class="form-control form-control-lg" placeholder="Enter username"
                                    formControlName="userName">

                                <div class="text-danger mt-1" *ngIf="
                    loginForm.controls.userName.touched &&
                    loginForm.controls.userName.invalid
                  ">
                                    Username is required
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Password
                                </label>
                                <input type="password" class="form-control form-control-lg" placeholder="Enter password"
                                    formControlName="password">

                                <div class="text-danger mt-1" *ngIf="
                    loginForm.controls.password.touched &&
                    loginForm.controls.password.invalid
                  ">
                                    Password must be at least 6 characters
                                </div>

                            </div>

                            <!-- Remember Me -->
                            <div class="d-flex justify-content-between mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label" for="remember">
                                        Remember Me
                                    </label>
                                </div>

                                <a href="#" class="text-decoration-none">
                                    Forgot Password?
                                </a>
                            </div>

                            <!-- Button -->
                            <button type="submit" (click)="loginUser()" class="btn btn-primary btn-lg w-100 rounded-3">
                                Login
                            </button>
                        </form>

                        <!-- Footer -->
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                Don't have an account?
                                <a routerLink="/signup" class="text-decoration-none fw-bold">
                                    Sign Up
                                </a>
                            </small>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
